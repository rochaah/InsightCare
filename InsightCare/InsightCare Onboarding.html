<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>InsightCare — Onboarding</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg-warm: #FBF7F2;
    --bg-card: #FFFFFF;
    --ink: #2D2A3A;
    --ink-soft: #6B6678;
    --ink-mute: #9B96A6;

    --lavender: #C8B8E8;
    --lavender-deep: #8B73C7;
    --lavender-soft: #EFE9FA;

    --mint: #B8E8D0;
    --mint-deep: #5FB089;
    --mint-soft: #E8F7EF;

    --peach: #F5C5A3;
    --peach-deep: #D88E5A;
    --peach-soft: #FBEBDB;

    --hair: rgba(45, 42, 58, 0.06);
  }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    background: #ECE7DF;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  @keyframes floatSoft {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
  }
  .logo-mark { animation: floatSoft 4.5s ease-in-out infinite; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;

    /* ---------- Brand mark: leaf + heart hybrid ---------- */
    function LogoMark({ size = 56 }) {
      return (
        <div className="logo-mark" style={{
          width: size, height: size, borderRadius: size * 0.32,
          background: 'linear-gradient(135deg, #C8B8E8 0%, #F5C5A3 60%, #B8E8D0 130%)',
          boxShadow: '0 10px 24px rgba(139,115,199,0.32), inset 0 1px 0 rgba(255,255,255,0.6)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative',
        }}>
          <svg width={size * 0.58} height={size * 0.58} viewBox="0 0 32 32" fill="none">
            {/* leaf-heart hybrid */}
            <path
              d="M16 28 C 8 22, 4 17, 4 12 A 6 6 0 0 1 16 8 A 6 6 0 0 1 28 12 C 28 17, 24 22, 16 28 Z"
              fill="#fff" opacity="0.96"
            />
            <path
              d="M16 22 C 13 17, 11 14, 12 11.5 C 12.6 10, 14 10, 14.5 11.5 C 15 13, 15.5 15, 16 17 C 16.5 15, 17 13, 17.5 11.5 C 18 10, 19.4 10, 20 11.5 C 21 14, 19 17, 16 22 Z"
              fill="#8B73C7"
            />
          </svg>
        </div>
      );
    }

    /* ---------- Icons for role cards ---------- */
    const PatientIcon = ({ color }) => (
      <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="13" r="6" stroke={color} strokeWidth="2.4" />
        <path d="M8 33 C 9.5 25.5, 14 22, 20 22 C 26 22, 30.5 25.5, 32 33"
              stroke={color} strokeWidth="2.4" strokeLinecap="round" />
        {/* heart accent */}
        <path d="M26.5 12 C 25.5 10.5, 23.5 11, 23.5 12.5 C 23.5 14, 25.5 15.5, 26.5 16
                 C 27.5 15.5, 29.5 14, 29.5 12.5 C 29.5 11, 27.5 10.5, 26.5 12 Z"
              fill={color} />
      </svg>
    );
    const PsychIcon = ({ color }) => (
      <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
        {/* clipboard */}
        <rect x="9" y="9" width="22" height="26" rx="4" stroke={color} strokeWidth="2.4" />
        <rect x="14" y="6" width="12" height="6" rx="2" fill={color} />
        <path d="M14 20h12M14 25h8" stroke={color} strokeWidth="2.4" strokeLinecap="round" />
        {/* heart in corner */}
        <path d="M27 18.5 C 26.2 17.4, 24.7 17.8, 24.7 18.9 C 24.7 20, 26.2 21.1, 27 21.5
                 C 27.8 21.1, 29.3 20, 29.3 18.9 C 29.3 17.8, 27.8 17.4, 27 18.5 Z"
              fill={color} opacity="0.7" />
      </svg>
    );

    const CheckIcon = ({ size = 14, color = '#fff' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <path d="m5 12 5 5L20 7" stroke={color} strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );

    /* ---------- Role card ---------- */
    function RoleCard({ role, selected, onSelect, accent, soft, deep, Icon, title, desc, badge }) {
      return (
        <button onClick={() => onSelect(role)} style={{
          width: '100%', textAlign: 'left',
          background: selected
            ? `linear-gradient(135deg, ${soft} 0%, #FFFFFF 120%)`
            : 'var(--bg-card)',
          border: selected ? `2px solid ${accent}` : '1.5px solid var(--hair)',
          borderRadius: 22,
          padding: '16px 18px',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 14,
          boxShadow: selected
            ? `0 14px 32px ${accent}33, 0 2px 6px ${accent}22`
            : '0 2px 10px rgba(70,60,100,0.04)',
          transform: selected ? 'translateY(-2px)' : 'translateY(0)',
          transition: 'all .25s cubic-bezier(.2,.8,.2,1)',
          position: 'relative',
        }}
        onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.985) translateY(-2px)'}
        onMouseUp={(e) => e.currentTarget.style.transform = selected ? 'translateY(-2px)' : 'translateY(0)'}
        onMouseLeave={(e) => e.currentTarget.style.transform = selected ? 'translateY(-2px)' : 'translateY(0)'}
        >
          {/* Icon tile */}
          <div style={{
            width: 64, height: 64, borderRadius: 18,
            background: selected ? '#fff' : soft,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
            boxShadow: selected
              ? `inset 0 0 0 1.5px ${accent}, 0 4px 10px ${accent}22`
              : 'none',
            transition: 'all .25s ease',
          }}>
            <Icon color={deep} />
          </div>

          {/* Text */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--ink)' }}>{title}</div>
              {badge && (
                <span style={{
                  fontSize: 9.5, fontWeight: 800, letterSpacing: 0.4,
                  color: deep, background: soft,
                  padding: '2px 7px', borderRadius: 999, textTransform: 'uppercase',
                }}>{badge}</span>
              )}
            </div>
            <div style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink-soft)', marginTop: 3, lineHeight: 1.35 }}>
              {desc}
            </div>
          </div>

          {/* Selector dot */}
          <div style={{
            width: 24, height: 24, borderRadius: 999,
            border: selected ? 'none' : '2px solid rgba(45,42,58,0.18)',
            background: selected ? accent : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0, transition: 'all .2s ease',
          }}>
            {selected && <CheckIcon size={14} color="#fff" />}
          </div>
        </button>
      );
    }

    /* ---------- Screen ---------- */
    function Onboarding() {
      const [role, setRole] = useState(null); // 'patient' | 'psych'
      const canContinue = role !== null;

      return (
        <div style={{
          width: '100%', height: '100%',
          background: 'var(--bg-warm)',
          position: 'relative', overflow: 'hidden',
          display: 'flex', flexDirection: 'column',
        }}>
          {/* Atmospheric glows */}
          <div style={{
            position: 'absolute', top: -120, right: -90, width: 320, height: 320, borderRadius: '50%',
            background: 'radial-gradient(closest-side, rgba(200,184,232,0.55), rgba(200,184,232,0))',
            pointerEvents: 'none',
          }} />
          <div style={{
            position: 'absolute', top: 140, left: -130, width: 280, height: 280, borderRadius: '50%',
            background: 'radial-gradient(closest-side, rgba(245,197,163,0.5), rgba(245,197,163,0))',
            pointerEvents: 'none',
          }} />
          <div style={{
            position: 'absolute', bottom: -140, right: -80, width: 300, height: 300, borderRadius: '50%',
            background: 'radial-gradient(closest-side, rgba(184,232,208,0.42), rgba(184,232,208,0))',
            pointerEvents: 'none',
          }} />

          {/* Content (scrollable just in case) */}
          <div style={{
            flex: 1, position: 'relative', zIndex: 1,
            overflowY: 'auto',
            padding: '70px 28px 28px',
            display: 'flex', flexDirection: 'column',
          }}>
            {/* Brand */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <LogoMark size={48} />
              <div>
                <div style={{ fontSize: 19, fontWeight: 900, letterSpacing: -0.3, color: 'var(--ink)' }}>
                  Insight<span style={{ color: 'var(--lavender-deep)' }}>Care</span>
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--ink-mute)', letterSpacing: 0.4, textTransform: 'uppercase' }}>
                  Cuidado entre sessões
                </div>
              </div>
            </div>

            {/* Welcome */}
            <div style={{ marginTop: 36 }}>
              <div style={{
                fontSize: 11, fontWeight: 800, color: 'var(--peach-deep)',
                letterSpacing: 1.1, textTransform: 'uppercase',
              }}>
                ✦ Olá, bom te ver aqui
              </div>
              <h1 style={{
                fontSize: 30, fontWeight: 900, color: 'var(--ink)',
                margin: '8px 0 6px', lineHeight: 1.1, letterSpacing: -0.6,
              }}>
                Bem-vindo<br/>ao <span style={{ color: 'var(--lavender-deep)' }}>InsightCare</span>
              </h1>
              <p style={{
                fontSize: 15, fontWeight: 600, color: 'var(--ink-soft)',
                margin: 0, lineHeight: 1.45, textWrap: 'pretty',
              }}>
                Como você vai usar o app?
              </p>
            </div>

            {/* Role cards */}
            <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 12 }}>
              <RoleCard
                role="patient"
                selected={role === 'patient'}
                onSelect={setRole}
                accent="#D88E5A" soft="var(--peach-soft)" deep="var(--peach-deep)"
                Icon={PatientIcon}
                title="Sou Paciente"
                desc="Acompanhe seu humor e converse com seu psicólogo entre sessões."
                badge="Grátis"
              />
              <RoleCard
                role="psych"
                selected={role === 'psych'}
                onSelect={setRole}
                accent="#8B73C7" soft="var(--lavender-soft)" deep="var(--lavender-deep)"
                Icon={PsychIcon}
                title="Sou Psicólogo"
                desc="Monitore o bem-estar dos seus pacientes com segurança e cuidado."
                badge="CRP"
              />
            </div>

            {/* tiny reassurance */}
            <div style={{
              marginTop: 'auto', paddingTop: 28,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
              fontSize: 11, fontWeight: 700, color: 'var(--ink-mute)',
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6l-8-3Z"
                      stroke="currentColor" strokeWidth="2" strokeLinejoin="round" />
              </svg>
              Seus dados são criptografados e privados
            </div>

            {/* CTA */}
            <button disabled={!canContinue} style={{
              marginTop: 18,
              width: '100%',
              border: 'none', cursor: canContinue ? 'pointer' : 'not-allowed',
              background: canContinue
                ? 'linear-gradient(135deg, #8B73C7 0%, #A78BD9 60%, #D88E5A 130%)'
                : 'rgba(45,42,58,0.08)',
              color: canContinue ? '#fff' : 'var(--ink-mute)',
              borderRadius: 18,
              padding: '16px 18px',
              fontSize: 16, fontWeight: 800, letterSpacing: 0.2,
              boxShadow: canContinue
                ? '0 12px 28px rgba(139,115,199,0.4), 0 4px 10px rgba(139,115,199,0.2)'
                : 'none',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              transition: 'all .25s ease',
            }}
            onMouseDown={(e) => canContinue && (e.currentTarget.style.transform = 'scale(0.98)')}
            onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
            onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
            >
              Continuar
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14M13 6l6 6-6 6"
                      stroke={canContinue ? '#fff' : 'var(--ink-mute)'}
                      strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>

            {/* Sign-in link */}
            <div style={{ marginTop: 14, textAlign: 'center', fontSize: 13, fontWeight: 700, color: 'var(--ink-soft)' }}>
              Já tenho conta?{' '}
              <a href="#" style={{ color: 'var(--lavender-deep)', textDecoration: 'none', fontWeight: 800 }}>
                Entrar
              </a>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- App ---------- */
    function App() {
      return (
        <IOSDevice width={402} height={874}>
          <Onboarding />
        </IOSDevice>
      );
    }

    const wait = () => {
      if (!window.IOSDevice) return setTimeout(wait, 30);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    };
    wait();
  </script>
</body>
</html>
