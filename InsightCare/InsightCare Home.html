<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>InsightCare — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg-warm: #FBF7F2;
    --bg-card: #FFFFFF;
    --ink: #2D2A3A;
    --ink-soft: #6B6678;
    --ink-mute: #9B96A6;
    --lavender: #C8B8E8;
    --lavender-deep: #8B73C7;
    --lavender-soft: #EFE9FA;
    --mint: #B8E8D0;
    --mint-deep: #5FB089;
    --mint-soft: #E8F7EF;
    --peach: #F5C5A3;
    --peach-deep: #D88E5A;
    --peach-soft: #FBEBDB;
    --hair: rgba(45, 42, 58, 0.06);
  }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    background: #ECE7DF;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  /* Hide scrollbars inside the phone */
  .phone-scroll::-webkit-scrollbar { display: none; }
  .phone-scroll { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;

    /* ---------- Icons (stroke-based, friendly) ---------- */
    const Icon = ({ d, size = 24, stroke = 'currentColor', fill = 'none', sw = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke}
           strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
    );
    const HomeIcon = (p) => <Icon {...p} d={<>
      <path d="M3 11.5 12 4l9 7.5" />
      <path d="M5 10.5V20h14v-9.5" />
      <path d="M10 20v-5h4v5" />
    </>} />;
    const JournalIcon = (p) => <Icon {...p} d={<>
      <path d="M6 4h11a2 2 0 0 1 2 2v14H8a2 2 0 0 1-2-2V4Z" />
      <path d="M6 4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2" />
      <path d="M10 9h6M10 13h4" />
    </>} />;
    const GoalsIcon = (p) => <Icon {...p} d={<>
      <circle cx="12" cy="12" r="8" />
      <circle cx="12" cy="12" r="4" />
      <circle cx="12" cy="12" r="1" fill="currentColor" />
    </>} />;
    const ProfileIcon = (p) => <Icon {...p} d={<>
      <circle cx="12" cy="8.5" r="3.5" />
      <path d="M5 20c1-3.5 4-5 7-5s6 1.5 7 5" />
    </>} />;
    const BellIcon = (p) => <Icon {...p} d={<>
      <path d="M6 16V11a6 6 0 1 1 12 0v5l1.5 2H4.5L6 16Z" />
      <path d="M10 20a2 2 0 0 0 4 0" />
    </>} />;
    const ChevronRight = (p) => <Icon {...p} d={<path d="m9 6 6 6-6 6" />} />;
    const Sparkle = (p) => <Icon {...p} d={<>
      <path d="M12 4v4M12 16v4M4 12h4M16 12h4" />
      <path d="m6.5 6.5 2.5 2.5M15 15l2.5 2.5M6.5 17.5 9 15M15 9l2.5-2.5" />
    </>} />;
    const Check = (p) => <Icon {...p} d={<path d="m5 12 5 5L20 7" />} sw={3} />;

    /* ---------- Mood chart ---------- */
    function MoodChart() {
      // 1 (low) .. 5 (high)
      const values = [3, 4, 2, 3, 4, 5, 4];
      const days = ['M','T','W','T','F','S','S'];
      const W = 320, H = 110, P = 18;
      const stepX = (W - P * 2) / (values.length - 1);
      const pts = values.map((v, i) => ({
        x: P + i * stepX,
        y: P + (1 - (v - 1) / 4) * (H - P * 2),
      }));
      // Smooth path
      const smooth = (() => {
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const cx1 = a.x + (b.x - a.x) / 2;
          const cx2 = a.x + (b.x - a.x) / 2;
          d += ` C ${cx1} ${a.y}, ${cx2} ${b.y}, ${b.x} ${b.y}`;
        }
        return d;
      })();
      const area = `${smooth} L ${pts[pts.length-1].x} ${H - P/2} L ${pts[0].x} ${H - P/2} Z`;
      const today = 5; // Saturday is "today"

      return (
        <div style={{
          background: 'var(--bg-card)',
          borderRadius: 24,
          padding: '18px 18px 12px',
          boxShadow: '0 4px 16px rgba(70, 60, 100, 0.06)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 0.8, fontWeight: 700, color: 'var(--ink-mute)', textTransform: 'uppercase' }}>This week</div>
              <div style={{ fontSize: 18, fontWeight: 800, marginTop: 2, color: 'var(--ink)' }}>Mood is trending up</div>
            </div>
            <div style={{
              background: 'var(--mint-soft)', color: 'var(--mint-deep)',
              fontSize: 12, fontWeight: 800, padding: '4px 10px', borderRadius: 999,
            }}>+18%</div>
          </div>

          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', marginTop: 6 }}>
            <defs>
              <linearGradient id="moodFill" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stopColor="#C8B8E8" stopOpacity="0.45" />
                <stop offset="100%" stopColor="#C8B8E8" stopOpacity="0" />
              </linearGradient>
              <linearGradient id="moodLine" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0%" stopColor="#A78BD9" />
                <stop offset="100%" stopColor="#F5A57B" />
              </linearGradient>
            </defs>
            {/* baseline */}
            <line x1={P} x2={W-P} y1={H-P/2} y2={H-P/2} stroke="var(--hair)" />
            {/* area */}
            <path d={area} fill="url(#moodFill)" />
            {/* line */}
            <path d={smooth} stroke="url(#moodLine)" strokeWidth="3" fill="none" strokeLinecap="round" />
            {/* dots */}
            {pts.map((p, i) => (
              <g key={i}>
                {i === today && (
                  <circle cx={p.x} cy={p.y} r="11" fill="#A78BD9" opacity="0.12" />
                )}
                <circle cx={p.x} cy={p.y} r={i === today ? 5.5 : 3.5}
                  fill={i === today ? '#fff' : '#A78BD9'}
                  stroke={i === today ? '#A78BD9' : 'none'} strokeWidth="3" />
              </g>
            ))}
          </svg>

          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0 14px', marginTop: 2 }}>
            {days.map((d, i) => (
              <div key={i} style={{
                fontSize: 11, fontWeight: i === today ? 800 : 600,
                color: i === today ? 'var(--lavender-deep)' : 'var(--ink-mute)',
                width: 14, textAlign: 'center',
              }}>{d}</div>
            ))}
          </div>
        </div>
      );
    }

    /* ---------- Goal card ---------- */
    function GoalRow({ title, meta, swatch, done, onToggle }) {
      return (
        <button onClick={onToggle} style={{
          width: '100%',
          display: 'flex', alignItems: 'center', gap: 14,
          background: 'var(--bg-card)',
          border: 'none',
          borderRadius: 20,
          padding: '14px 14px',
          textAlign: 'left',
          cursor: 'pointer',
          boxShadow: '0 2px 10px rgba(70, 60, 100, 0.05)',
          transition: 'transform .15s ease',
        }}
        onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.985)'}
        onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
        onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
        >
          {/* swatch */}
          <div style={{
            width: 44, height: 44, borderRadius: 14,
            background: swatch.bg, display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>
            <span style={{ fontSize: 22 }}>{swatch.emoji}</span>
          </div>

          {/* text */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontSize: 15, fontWeight: 800, color: 'var(--ink)',
              textDecoration: done ? 'line-through' : 'none',
              opacity: done ? 0.5 : 1,
            }}>{title}</div>
            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-mute)', marginTop: 2 }}>{meta}</div>
          </div>

          {/* checkbox */}
          <div style={{
            width: 28, height: 28, borderRadius: 999,
            border: done ? 'none' : '2px solid rgba(45,42,58,0.18)',
            background: done ? 'var(--mint-deep)' : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0, transition: 'all .2s ease',
          }}>
            {done && <Check size={16} stroke="#fff" />}
          </div>
        </button>
      );
    }

    /* ---------- Bottom nav ---------- */
    function BottomNav({ active, setActive }) {
      const tabs = [
        { id: 'home', label: 'Home', Ic: HomeIcon },
        { id: 'journal', label: 'Journal', Ic: JournalIcon },
        { id: 'goals', label: 'Goals', Ic: GoalsIcon },
        { id: 'profile', label: 'Profile', Ic: ProfileIcon },
      ];
      return (
        <div style={{
          position: 'absolute', left: 0, right: 0, bottom: 0,
          paddingBottom: 28, zIndex: 10, // home indicator space
          background: 'rgba(255,255,255,0.92)',
          backdropFilter: 'blur(20px)',
          WebkitBackdropFilter: 'blur(20px)',
          borderTop: '1px solid var(--hair)',
          display: 'flex', justifyContent: 'space-around',
          paddingTop: 10,
        }}>
          {tabs.map(({ id, label, Ic }) => {
            const isActive = active === id;
            return (
              <button key={id} onClick={() => setActive(id)} style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                padding: '4px 12px',
                color: isActive ? 'var(--lavender-deep)' : 'var(--ink-mute)',
              }}>
                <div style={{
                  width: 44, height: 30, borderRadius: 999,
                  background: isActive ? 'var(--lavender-soft)' : 'transparent',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  transition: 'background .2s ease',
                }}>
                  <Ic size={22} stroke="currentColor" sw={isActive ? 2.4 : 2} />
                </div>
                <div style={{ fontSize: 10.5, fontWeight: isActive ? 800 : 700 }}>{label}</div>
              </button>
            );
          })}
        </div>
      );
    }

    /* ---------- Screen ---------- */
    function HomeScreen() {
      const [active, setActive] = useState('home');
      const [goals, setGoals] = useState([
        { id: 1, title: '10-minute mindful breathing', meta: 'Morning · 5 min left', done: true,
          swatch: { bg: 'var(--lavender-soft)', emoji: '🌿' } },
        { id: 2, title: 'Write 3 gratitudes', meta: 'Anytime today', done: false,
          swatch: { bg: 'var(--peach-soft)', emoji: '✍️' } },
        { id: 3, title: 'Walk outside, no phone', meta: 'After lunch · 20 min', done: false,
          swatch: { bg: 'var(--mint-soft)', emoji: '🚶' } },
      ]);
      const toggle = (id) => setGoals(gs => gs.map(g => g.id === id ? { ...g, done: !g.done } : g));
      const completed = goals.filter(g => g.done).length;

      return (
        <div style={{
          width: '100%', height: '100%',
          background: 'var(--bg-warm)',
          position: 'relative',
          overflow: 'hidden',
          display: 'flex', flexDirection: 'column',
        }}>
          {/* soft background glow */}
          <div style={{
            position: 'absolute', top: -120, right: -80, width: 280, height: 280, borderRadius: '50%',
            background: 'radial-gradient(closest-side, rgba(200,184,232,0.45), rgba(200,184,232,0))',
            pointerEvents: 'none',
          }} />
          <div style={{
            position: 'absolute', top: 60, left: -100, width: 240, height: 240, borderRadius: '50%',
            background: 'radial-gradient(closest-side, rgba(245,197,163,0.35), rgba(245,197,163,0))',
            pointerEvents: 'none',
          }} />

          <div className="phone-scroll" style={{
            flex: 1, overflowY: 'auto', position: 'relative', zIndex: 1,
            padding: '56px 20px 135px',
          }}>
            {/* Greeting */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 6 }}>
              <div style={{
                width: 52, height: 52, borderRadius: 18,
                background: 'linear-gradient(135deg, #F5C5A3 0%, #C8B8E8 100%)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 26,
                boxShadow: '0 6px 16px rgba(200,184,232,0.5)',
              }}>🌤️</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-mute)', letterSpacing: 0.3 }}>Tuesday, May 27</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--ink)', lineHeight: 1.15, marginTop: 2 }}>
                  Good morning,<br/>Sarah <span style={{ fontWeight: 700, color: 'var(--lavender-deep)' }}>·</span> feeling gentle today
                </div>
              </div>
            </div>

            {/* Notification banner */}
            <div style={{
              marginTop: 18,
              background: 'linear-gradient(135deg, #EFE9FA 0%, #FBEBDB 110%)',
              borderRadius: 20,
              padding: '14px 14px',
              display: 'flex', alignItems: 'center', gap: 12,
              cursor: 'pointer',
              border: '1px solid rgba(139,115,199,0.12)',
            }}>
              <div style={{
                width: 40, height: 40, borderRadius: 14,
                background: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
                boxShadow: '0 2px 8px rgba(139,115,199,0.18)',
              }}>
                <BellIcon size={20} stroke="var(--lavender-deep)" sw={2.2} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: 'var(--ink)' }}>
                  Dr. Patel left feedback
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)', marginTop: 1 }}>
                  On your Sunday journal entry · 2h ago
                </div>
              </div>
              <ChevronRight size={18} stroke="var(--lavender-deep)" />
            </div>

            {/* Mood chart */}
            <div style={{ marginTop: 16 }}>
              <MoodChart />
            </div>

            {/* Daily Check-in */}
            <button style={{
              marginTop: 18, width: '100%',
              border: 'none', cursor: 'pointer',
              background: 'linear-gradient(135deg, #8B73C7 0%, #A78BD9 60%, #D88E5A 130%)',
              borderRadius: 24,
              padding: '20px 20px',
              display: 'flex', alignItems: 'center', gap: 14,
              boxShadow: '0 10px 24px rgba(139,115,199,0.32)',
              color: '#fff',
              textAlign: 'left',
              transition: 'transform .15s ease',
            }}
            onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.98)'}
            onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
            onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
            >
              <div style={{
                width: 48, height: 48, borderRadius: 16,
                background: 'rgba(255,255,255,0.22)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
                backdropFilter: 'blur(8px)',
              }}>
                <Sparkle size={24} stroke="#fff" sw={2.2} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: 0.1 }}>Daily Check-in</div>
                <div style={{ fontSize: 12.5, fontWeight: 600, opacity: 0.86, marginTop: 2 }}>
                  3 short questions · about 2 minutes
                </div>
              </div>
              <div style={{
                width: 36, height: 36, borderRadius: 999,
                background: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: 'var(--lavender-deep)',
                flexShrink: 0,
              }}>
                <ChevronRight size={18} stroke="currentColor" sw={2.4} />
              </div>
            </button>

            {/* Goals section */}
            <div style={{ marginTop: 22, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '0 4px' }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 0.8, fontWeight: 700, color: 'var(--ink-mute)', textTransform: 'uppercase' }}>Today's intentions</div>
                <div style={{ fontSize: 18, fontWeight: 800, marginTop: 2, color: 'var(--ink)' }}>
                  {completed} of {goals.length} complete
                </div>
              </div>
              <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--lavender-deep)' }}>See all</div>
            </div>

            <div style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 10 }}>
              {goals.map(g => (
                <GoalRow key={g.id} {...g} onToggle={() => toggle(g.id)} />
              ))}
            </div>

            {/* gentle footer note */}
            <div style={{
              marginTop: 18, textAlign: 'center',
              fontSize: 12, fontWeight: 600, color: 'var(--ink-mute)',
            }}>
              You're doing great. One breath at a time. ✨
            </div>
          </div>

          <BottomNav active={active} setActive={setActive} />
        </div>
      );
    }

    /* ---------- App ---------- */
    function App() {
      return (
        <IOSDevice width={402} height={874}>
          <HomeScreen />
        </IOSDevice>
      );
    }

    const wait = () => {
      if (!window.IOSDevice) return setTimeout(wait, 30);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    };
    wait();
  </script>
</body>
</html>
