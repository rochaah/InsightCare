/* ═══════════════════════════════════════
   PATIENT HOME

function MoodChart() {
  const values = [3, 4, 2, 3, 4, 5, 4];
  const days = ['S','T','Q','Q','S','S','D'];
  const W = 320, H = 110, P = 18;
  const stepX = (W - P * 2) / (values.length - 1);
  const pts = values.map((v, i) => ({ x: P + i * stepX, y: P + (1 - (v - 1) / 4) * (H - P * 2) }));
  const smooth = (() => {
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i + 1];
      const cx1 = a.x + (b.x - a.x) / 2, cx2 = a.x + (b.x - a.x) / 2;
      d += ` C ${cx1} ${a.y}, ${cx2} ${b.y}, ${b.x} ${b.y}`;
    }
    return d;
  })();
  const area = `${smooth} L ${pts[pts.length-1].x} ${H - P/2} L ${pts[0].x} ${H - P/2} Z`;
  const today = 5;
  return (
    <div style={{ background: 'var(--bg-card)', borderRadius: 24, padding: '18px 18px 12px', boxShadow: '0 4px 16px rgba(70,60,100,0.06)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: 0.8, fontWeight: 700, color: 'var(--ink-mute)', textTransform: 'uppercase' }}>Esta semana</div>
          <div style={{ fontSize: 18, fontWeight: 800, marginTop: 2, color: 'var(--ink)' }}>Humor em alta</div>
        </div>
        <div style={{ background: 'var(--mint-soft)', color: 'var(--mint-deep)', fontSize: 12, fontWeight: 800, padding: '4px 10px', borderRadius: 999 }}>+18%</div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', marginTop: 6 }}>
        <defs>
          <linearGradient id="moodFill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#C8B8E8" stopOpacity="0.45"/>
            <stop offset="100%" stopColor="#C8B8E8" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="moodLine" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stopColor="#A78BD9"/>
            <stop offset="100%" stopColor="#F5A57B"/>
          </linearGradient>
        </defs>
        <line x1={P} x2={W-P} y1={H-P/2} y2={H-P/2} stroke="var(--hair)"/>
        <path d={area} fill="url(#moodFill)"/>
        <path d={smooth} stroke="url(#moodLine)" strokeWidth="3" fill="none" strokeLinecap="round"/>
        {pts.map((p, i) => (
          <g key={i}>

function Sparkline({ values, color, width = 110, height = 36 }) {
  const P = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const range = Math.max(0.0001, max - min);
  const stepX = (width - P * 2) / (values.length - 1);
  const pts = values.map((v, i) => ({ x: P + i * stepX, y: P + (1 - (v - min) / range) * (height - P * 2) }));
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    const cx = a.x + (b.x - a.x) / 2;
    d += ` C ${cx} ${a.y}, ${cx} ${b.y}, ${b.x} ${b.y}`;
  }
  const area = `${d} L ${pts[pts.length-1].x} ${height - P/2} L ${pts[0].x} ${height - P/2} Z`;
  const last = pts[pts.length - 1];
  const id = useMemo(() => 'g' + Math.random().toString(36).slice(2, 8), []);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <defs>
        <linearGradient id={id} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={last.x} cy={last.y} r="2.5" fill="#fff" stroke={color} strokeWidth="2"/>
    </svg>
  );
}

          <button style={{ width: 44, height: 44, borderRadius: 14, background: 'var(--bg-card)', border: '1px solid var(--hair)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--ink-soft)' }}>
            <FilterIcon size={20} stroke="currentColor"/>
          </button>
        </div>

        <div ref={chipsRowRef} style={{ marginTop: 10, display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4 }} className="phone-scroll">
          {chips.map(c => {
            const isActive = filter === c.id;
            return (
              <button key={c.id} ref={el => chipRefs.current[c.id] = el} onClick={() => setFilter(c.id)} style={{
                background: isActive ? c.color : 'var(--bg-card)',
                color: isActive ? '#fff' : c.color,
                border: isActive ? 'none' : '1px solid var(--hair)',
                padding: '7px 14px', borderRadius: 999, fontSize: 12.5, fontWeight: 800,
                cursor: 'pointer', whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 6,
              }}>
                {c.label}
                <span style={{ background: isActive ? 'rgba(255,255,255,0.25)' : 'var(--bg-warm)', padding: '1px 7px', borderRadius: 999, fontSize: 10.5 }}>{counts[c.id]}</span>
              </button>
            );
          })}
        </div>

        <div style={{ marginTop: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '0 4px' }}>
          <div style={{ fontSize: 11, letterSpacing: 0.8, fontWeight: 700, color: 'var(--ink-mute)', textTransform: 'uppercase' }}>Seus pacientes</div>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink-mute)' }}>Por prioridade</div>
        </div>

        <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {filtered.map(p => <PatientCard key={p.id} p={p}/>)}
          {filtered.length === 0 && (
            <div style={{ background: 'var(--bg-card)', borderRadius: 20, padding: 24, textAlign: 'center', color: 'var(--ink-mute)', fontSize: 13, fontWeight: 700 }}>Nenhum paciente encontrado</div>
          )}
        </div>
      </div>

      <button style={{
        position: 'absolute', right: 20, bottom: 110,
        width: 60, height: 60, borderRadius: 22,
        border: 'none', cursor: 'pointer',
        background: 'linear-gradient(135deg, #8B73C7 0%, #A78BD9 60%, #D88E5A 130%)',
        color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: '0 12px 28px rgba(139,115,199,0.45)', zIndex: 11, transition: 'transform .15s ease',
      }} title="Adicionar paciente">
        <PlusIcon size={26} stroke="#fff"/>
      </button>

      <PsychBottomNav active={active} setActive={setActive}/>
    </div>
  );
}

/* ═══════════════════════════════════════
   ROOT APP
═══════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('onboarding'); // 'onboarding' | 'patient' | 'psych'

  const handleContinue = (role) => {
    setScreen(role === 'patient' ? 'patient' : 'psych');
  };

  return (
    <IOSDevice width={402} height={874}>
      {screen === 'onboarding' && <OnboardingScreen onContinue={handleContinue}/>}
      {screen === 'patient'    && <div className="slide-in" style={{ width: '100%', height: '100%' }}><PatientHomeScreen/></div>}
      {screen === 'psych'      && <div className="slide-in" style={{ width: '100%', height: '100%' }}><PsychDashboard/></div>}
    </IOSDevice>
  );
}

const wait = () => {
  if (!window.IOSDevice) return setTimeout(wait, 30);
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
};
wait();
</script>
</body>
</html>
